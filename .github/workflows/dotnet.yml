# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v6

    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        cache: true
        cache-dependency-path: '**/*.csproj'

    - name: 📈 Install dotnet-coverage
      run: dotnet tool install -g dotnet-coverage

    - name: 💉 Install dependencies
      run: dotnet restore

    - name: 🛠️ Build
      run: dotnet build -c Release --no-restore

    - name: ✅ Run tests and collect coverage
      run: dotnet-coverage collect "dotnet test -c Release --no-build --verbosity normal ./Z80Emu.sln" -f cobertura -o coverage.cobertura.xml

    - name: 📈 Upload coverage to codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.cobertura.xml
        fail_ci_if_error: false
        flags: unittests
        verbose: true

    - name: 📤 Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: z80emu
        path: Z80Emu/bin/Release/net10.0/*
        if-no-files-found: error
        retention-days: 7

    - name: 📝 Generate build summary
      run: |
        echo "### 🎉 Build Completed Successfully!" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Tests passed" >> $GITHUB_STEP_SUMMARY
        echo "- 📊 Code coverage uploaded" >> $GITHUB_STEP_SUMMARY
        echo "- 📦 Artifacts published" >> $GITHUB_STEP_SUMMARY
